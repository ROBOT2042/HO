<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LEGEND: MR. HO SHING HEI</title>
    <style>
        :root {
            --primary-blue: #001f3f;
            --gold-glow: #ffdf00;
            --neon-blue: #00d4ff;
            --field-green: #2ecc71;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            margin: 0;
            background-color: #050505;
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* Animated Background Text for Repetition */
        .bg-scroll {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            font-size: 4rem;
            pointer-events: none;
            user-select: none;
            text-transform: uppercase;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a365d 0%, #000 100%);
            text-align: center;
            border-bottom: 5px solid var(--gold-glow);
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--gold-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 223, 0, 0.5));
        }

        .marquee {
            background: var(--gold-glow);
            color: black;
            padding: 12px 0;
            white-space: nowrap;
            overflow: hidden;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.2rem;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
        }

        .marquee span {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }

        .highlight-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-blue);
            padding: 40px;
            margin-bottom: 60px;
            border-radius: 20px;
            transition: 0.4s;
            position: relative;
        }

        .highlight-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .praise-repeat {
            color: var(--gold-glow);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .big-phrase {
            font-size: 2.8rem;
            margin: 10px 0;
            color: #fff;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: rgba(0,0,0,0.5);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .card h3 { color: var(--gold-glow); margin-top: 0; }

        .sports-box {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
        }

        .echo-text {
            text-align: center;
            margin: 80px 0;
        }

        .echo-1 { font-size: 4rem; opacity: 1; margin: 0; }
        .echo-2 { font-size: 4rem; opacity: 0.5; margin: -10px 0 0 0; }
        .echo-3 { font-size: 4rem; opacity: 0.2; margin: -10px 0 0 0; }

        footer {
            text-align: center;
            padding: 60px 20px;
            background: #000;
            border-top: 1px solid #333;
            font-family: sans-serif;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 3.5rem; }
            .big-phrase { font-size: 2rem; }
            .sports-box { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-scroll">
        PHYSICS PHYSICS PHYSICS PHYSICS PHYSICS PHYSICS PHYSICS<br>
        LACROSSE LACROSSE LACROSSE LACROSSE LACROSSE LACROSSE<br>
        STEAM STEAM STEAM STEAM STEAM STEAM STEAM STEAM STEAM<br>
        LEADER LEADER LEADER LEADER LEADER LEADER LEADER LEADER
    </div>

    <header>
        <p class="praise-repeat">THE VISIONARY. THE MENTOR. THE PIONEER.</p>
        <h1 class="hero-title">HO SHING HEI</h1>
        <div class="big-phrase" style="color: var(--gold-glow);">DRIVEN BY DISCOVERY</div>
